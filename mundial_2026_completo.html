
<h2 class="sr-only">Mundial 2026 - Fixture y tabla de grupos en tiempo real</h2>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.header { text-align: center; padding: 1.2rem 0 0.6rem; }
.header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
.nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0.6rem 1rem 0.5rem; }
.nav button { font-size: 13px; padding: 6px 14px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.nav button.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.section { display: none; padding: 0.5rem 1rem 1.5rem; }
.section.visible { display: block; }
.match-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.9rem 1.1rem; margin-bottom: 8px; }
.match-card.live { border-left: 3px solid #C62828; border-radius: 0 var(--border-radius-lg) var(--border-radius-lg) 0; }
.match-card.upcoming { border-left: 3px solid #1565C0; border-radius: 0 var(--border-radius-lg) var(--border-radius-lg) 0; }
.match-card.closed { opacity: 0.72; }
.pill { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; display: inline-block; margin-bottom: 7px; }
.pill-live { background: #FFEBEE; color: #C62828; }
.pill-upcoming { background: #E3F2FD; color: #1565C0; }
.pill-closed { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.match-row { display: flex; align-items: center; gap: 8px; }
.team { flex: 1; font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.team.right { text-align: right; }
.score-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 5px 14px; text-align: center; min-width: 72px; font-size: 19px; font-weight: 500; color: var(--color-text-primary); }
.score-box.time { font-size: 14px; color: var(--color-text-secondary); }
.match-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 7px; border-top: 0.5px solid var(--color-border-tertiary); font-size: 11px; color: var(--color-text-secondary); }
.canal { background: #E3F2FD; color: #1565C0; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
.minute { color: #C62828; font-weight: 500; }
.day-header { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin: 1.1rem 0 0.4rem; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 4px; }
.grupos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 10px; }
.grupo-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.grupo-titulo { background: var(--color-background-secondary); padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--color-text-primary); border-bottom: 0.5px solid var(--color-border-tertiary); }
.gt { width: 100%; border-collapse: collapse; font-size: 12px; }
.gt th { padding: 5px 10px; color: var(--color-text-tertiary); font-weight: 400; font-size: 11px; text-align: center; }
.gt th:first-child { text-align: left; }
.gt td { padding: 6px 10px; color: var(--color-text-primary); text-align: center; border-top: 0.5px solid var(--color-border-tertiary); }
.gt td:first-child { text-align: left; }
.c1 { color: #1565C0; font-weight: 500; }
.c2 { color: #2E7D32; font-weight: 500; }
.elim { color: var(--color-text-tertiary); text-decoration: line-through; }
.pn { font-size: 10px; color: var(--color-text-tertiary); margin-right: 3px; }
.leyenda { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; font-size: 12px; color: var(--color-text-secondary); margin: 0.4rem 0 0.9rem; }
.leyenda span { display: flex; align-items: center; gap: 4px; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.loading { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
.error-msg { text-align: center; padding: 1.5rem; color: var(--color-text-danger, #C62828); font-size: 13px; background: var(--color-background-danger, #FFEBEE); border-radius: var(--border-radius-md); margin: 1rem 0; }
.refresh-btn { display: flex; align-items: center; gap: 6px; margin: 0 auto 0.5rem; font-size: 12px; color: var(--color-text-secondary); background: none; border: 0.5px solid var(--color-border-secondary); border-radius: 99px; padding: 4px 12px; cursor: pointer; }
.updated { text-align: center; font-size: 11px; color: var(--color-text-tertiary); margin-top: 0.5rem; }
.hoy-badge { display: inline-block; background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); margin-bottom: 0.8rem; }
</style>

<div class="header">
  <h1><i class="ti ti-ball-football" aria-hidden="true"></i> Mundial 2026</h1>
  <p>USA · Canadá · México — Fase de grupos</p>
</div>

<div class="nav">
  <button class="active" onclick="mostrar('hoy',this)"><i class="ti ti-radio" aria-hidden="true"></i> Hoy</button>
  <button onclick="mostrar('fixture',this)">Fixture</button>
  <button onclick="mostrar('grupos',this)">Grupos</button>
</div>

<div id="sec-hoy" class="section visible">
  <div style="text-align:center"><span class="hoy-badge" id="hoy-fecha">Cargando...</span></div>
  <div id="hoy-content"><div class="loading"><i class="ti ti-loader-2" aria-hidden="true"></i> Consultando resultados...</div></div>
  <div class="updated" id="hoy-updated"></div>
</div>

<div id="sec-fixture" class="section">
  <button class="refresh-btn" onclick="loadFixture()"><i class="ti ti-refresh" aria-hidden="true"></i> Actualizar</button>
  <div id="fixture-content"><div class="loading">Cargando fixture...</div></div>
</div>

<div id="sec-grupos" class="section">
  <div class="leyenda">
    <span><span class="dot" style="background:#1565C0"></span> 1° clasifica</span>
    <span><span class="dot" style="background:#2E7D32"></span> 2° clasifica</span>
    <span><span class="dot" style="background:#999"></span> Eliminado</span>
  </div>
  <button class="refresh-btn" onclick="loadGroups()"><i class="ti ti-refresh" aria-hidden="true"></i> Actualizar</button>
  <div id="grupos-content"><div class="loading">Cargando grupos...</div></div>
</div>

<script>
const CANALES = {
  'Argentina': 'TyC / Telefe / TV Pública',
  default: 'TyC Sports / DSports'
};

function getCanal(home, away) {
  if (home === 'Argentina' || away === 'Argentina') return CANALES['Argentina'];
  return CANALES.default;
}

function toARG(utc) {
  const d = new Date(utc);
  return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Argentina/Buenos_Aires' });
}

function toARGDate(utc) {
  const d = new Date(utc);
  return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Argentina/Buenos_Aires' });
}

function toARGDateKey(utc) {
  const d = new Date(utc);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', timeZone: 'America/Argentina/Buenos_Aires' });
}

function isToday(utc) {
  const d = new Date(utc);
  const now = new Date();
  const argNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
  const argD = new Date(d.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
  return argNow.toDateString() === argD.toDateString();
}

function statusPill(status, minute) {
  if (status === 'closed' || status === 'complete') return `<span class="pill pill-closed"><i class="ti ti-check" aria-hidden="true"></i> Finalizado</span>`;
  if (status === 'inprogress' || status === 'live') {
    const min = minute ? `<span class="minute">${minute}'</span>` : '';
    return `<span class="pill pill-live"><i class="ti ti-radio" aria-hidden="true"></i> En juego ${min}</span>`;
  }
  return `<span class="pill pill-upcoming"><i class="ti ti-clock" aria-hidden="true"></i> Próximo</span>`;
}

function cardClass(status) {
  if (status === 'closed' || status === 'complete') return 'match-card closed';
  if (status === 'inprogress' || status === 'live') return 'match-card live';
  return 'match-card upcoming';
}

function scoreOrTime(game) {
  const s = game.status;
  if (s === 'closed' || s === 'complete' || s === 'inprogress' || s === 'live') {
    const h = game.home_points ?? game.home_score ?? '?';
    const a = game.away_points ?? game.away_score ?? '?';
    return `<div class="score-box">${h} - ${a}</div>`;
  }
  return `<div class="score-box time">${toARG(game.scheduled)}</div>`;
}

function matchCard(game, showCanal) {
  const home = game.home?.name || game.home_team || 'Local';
  const away = game.away?.name || game.away_team || 'Visitante';
  const group = game.tournament?.name || game.round?.name || '';
  const venue = game.venue?.name || '';
  const canal = showCanal ? `<span class="canal">${getCanal(home, away)}</span>` : '';
  const meta = [group, venue].filter(Boolean).join(' · ');
  const minute = game.clock?.played || game.match_clock || null;

  return `
    <div class="${cardClass(game.status)}">
      ${statusPill(game.status, minute)}
      <div class="match-row">
        <div class="team">${home}</div>
        ${scoreOrTime(game)}
        <div class="team right">${away}</div>
      </div>
      <div class="match-footer">
        <span>${meta}</span>
        ${canal}
      </div>
    </div>`;
}

async function fetchGames() {
  const resp = await fetch('/api/sports/world_cup/scores', { method: 'GET' });
  if (!resp.ok) throw new Error('API error ' + resp.status);
  const data = await resp.json();
  return data;
}

function groupByDay(games) {
  const map = {};
  games.forEach(g => {
    const key = toARGDateKey(g.scheduled);
    if (!map[key]) map[key] = [];
    map[key].push(g);
  });
  return map;
}

function todayLabel(games) {
  const todayGames = games.filter(g => isToday(g.scheduled));
  if (!todayGames.length) return 'Sin partidos hoy';
  const d = toARGDate(todayGames[0].scheduled);
  return d.charAt(0).toUpperCase() + d.slice(1);
}

let allGames = [];

async function loadAll() {
  try {
    const data = await fetchGames();
    allGames = (data.sport_events || data.results || data.games || data.matches || [])
      .map(r => r.sport_event_status ? { ...r.sport_event, ...r.sport_event_status, home: r.sport_event?.competitors?.[0], away: r.sport_event?.competitors?.[1] } : r)
      .sort((a, b) => new Date(a.scheduled) - new Date(b.scheduled));

    renderHoy();
    renderFixture();
  } catch (e) {
    document.getElementById('hoy-content').innerHTML = `<div class="error-msg">No se pudo conectar con la API de deportes.<br><small>${e.message}</small></div>`;
  }
}

function renderHoy() {
  const today = allGames.filter(g => isToday(g.scheduled));
  document.getElementById('hoy-fecha').textContent = today.length ? (() => { const d = toARGDate(today[0].scheduled); return d.charAt(0).toUpperCase() + d.slice(1); })() : 'Hoy';

  if (!today.length) {
    document.getElementById('hoy-content').innerHTML = `<div class="loading">No hay partidos programados hoy</div>`;
    return;
  }
  document.getElementById('hoy-content').innerHTML = today.map(g => matchCard(g, true)).join('');
  document.getElementById('hoy-updated').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
}

function renderFixture() {
  const byDay = groupByDay(allGames);
  const today = new Date();
  const argToday = new Date(today.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));

  let html = '';
  Object.entries(byDay).forEach(([dateKey, games]) => {
    const d = new Date(games[0].scheduled);
    const isT = isToday(games[0].scheduled);
    const isPast = new Date(d.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' })) < argToday && !isT;
    const label = toARGDate(games[0].scheduled);
    const cap = label.charAt(0).toUpperCase() + label.slice(1);
    html += `<div class="day-header">${cap}${isT ? ' — HOY' : isPast ? ' ✓' : ''}</div>`;
    html += games.map(g => matchCard(g, isT)).join('');
  });
  document.getElementById('fixture-content').innerHTML = html || '<div class="loading">Sin datos</div>';
}

function loadFixture() { renderFixture(); }

async function loadGroups() {
  document.getElementById('grupos-content').innerHTML = '<div class="loading">Cargando...</div>';
  try {
    const resp = await fetch('/api/sports/world_cup/standings');
    const data = await resp.json();
    renderGroups(data);
  } catch (e) {
    document.getElementById('grupos-content').innerHTML = `<div class="error-msg">No se pudo cargar la tabla.<br><small>${e.message}</small></div>`;
  }
}

function renderGroups(data) {
  const standings = data.standings || data.groups || data.tournament_standings || [];
  if (!standings.length) {
    document.getElementById('grupos-content').innerHTML = '<div class="error-msg">No se encontraron datos de grupos</div>';
    return;
  }

  let html = '<div class="grupos-grid">';
  standings.forEach(group => {
    const name = group.name || group.group_name || 'Grupo';
    const teams = group.standings || group.teams || [];
    html += `<div class="grupo-card"><div class="grupo-titulo">${name}</div>
      <table class="gt"><tr><th>Selección</th><th>PJ</th><th>DG</th><th>PTS</th></tr>`;
    teams.forEach((t, i) => {
      const tname = t.name || t.team?.name || '?';
      const pj = t.played || t.games_played || 0;
      const dg = (t.goals_for ?? 0) - (t.goals_against ?? 0);
      const pts = t.points || 0;
      const dgStr = dg > 0 ? '+' + dg : dg;
      let cls = '';
      if (i === 0) cls = 'c1';
      else if (i === 1) cls = 'c2';
      else if (pts === 0 && pj >= 2) cls = 'elim';
      html += `<tr><td><span class="pn">${i+1}</span><span class="${cls}">${tname}</span></td><td>${pj}</td><td>${dgStr}</td><td>${pts}</td></tr>`;
    });
    html += '</table></div>';
  });
  html += '</div>';
  document.getElementById('grupos-content').innerHTML = html;
}

function mostrar(sec, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('visible');
  btn.classList.add('active');
  if (sec === 'grupos' && !document.getElementById('grupos-content').querySelector('.grupo-card')) loadGroups();
}

loadAll();
</script>
