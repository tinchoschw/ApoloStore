<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Mundial 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f5f0;
    color: #1a1a1a;
    font-size: 20px;
    line-height: 1.4;
  }

  /* ── HEADER ── */
  .header {
    background: #1a1a2e;
    color: white;
    text-align: center;
    padding: 24px 16px 16px;
  }
  .header h1 { font-size: 40px; font-weight: bold; letter-spacing: 1px; }
  .header .sub { font-size: 22px; color: #aab; margin-top: 4px; }
  .header .upd { font-size: 18px; color: #889; margin-top: 8px; }

  /* ── NAV ── */
  .nav {
    display: flex;
    justify-content: center;
    gap: 0;
    background: #16213e;
    border-bottom: 3px solid #0f3460;
  }
  .nav button {
    font-size: 26px;
    font-family: Georgia, serif;
    padding: 16px 48px;
    border: none;
    background: transparent;
    color: #aab;
    cursor: pointer;
    border-bottom: 4px solid transparent;
    transition: all 0.2s;
  }
  .nav button.active {
    color: white;
    border-bottom: 4px solid #e94560;
    background: #1a1a2e;
  }
  .nav button:hover:not(.active) { color: white; background: #1a1a2e88; }

  /* ── TABS ── */
  .tab { display: none; padding: 24px 20px 40px; max-width: 900px; margin: 0 auto; }
  .tab.visible { display: block; }

  /* ── ESTADOS ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    font-size: 26px;
    color: #666;
  }
  .error {
    text-align: center;
    padding: 32px;
    font-size: 22px;
    color: #c62828;
    background: #ffebee;
    border: 2px solid #ef9a9a;
    border-radius: 12px;
    margin: 20px 0;
  }

  /* ── DÍA ── */
  .dia-bloque { margin-bottom: 32px; }
  .dia-titulo {
    font-size: 26px;
    font-weight: bold;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 0 8px;
    border-bottom: 2px solid #ccc;
    margin-bottom: 14px;
  }
  .dia-titulo.hoy {
    color: #1b5e20;
    border-bottom-color: #2e7d32;
    font-size: 28px;
  }

  /* ── PARTIDO ── */
  .partido {
    border: 2px solid #ddd;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 14px;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .partido.live {
    border: 3px solid #c62828;
    box-shadow: 0 2px 12px rgba(198,40,40,0.15);
  }
  .partido.done { background: #fafafa; border-color: #e0e0e0; }
  .partido.next { border-color: #bbdefb; background: #f8fbff; }

  .estado-pill {
    display: inline-block;
    font-size: 20px;
    font-weight: bold;
    padding: 4px 16px;
    border-radius: 99px;
    margin-bottom: 12px;
  }
  .pill-done { background: #f0f0f0; color: #777; }
  .pill-live { background: #ffebee; color: #c62828; }
  .pill-next { background: #e3f2fd; color: #1565c0; }

  .partido-fila {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .equipo {
    flex: 1;
    font-size: 28px;
    font-weight: bold;
    color: #1a1a1a;
  }
  .equipo.der { text-align: right; }

  .marcador {
    background: #1a1a2e;
    color: white;
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 36px;
    font-weight: bold;
    min-width: 110px;
    text-align: center;
    letter-spacing: 2px;
  }
  .marcador.hora {
    background: #e3f2fd;
    color: #1565c0;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .goles {
    font-size: 19px;
    color: #666;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid #eee;
    font-style: italic;
  }

  .partido-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #eee;
    font-size: 20px;
    color: #888;
    flex-wrap: wrap;
    gap: 8px;
  }
  .canal {
    font-size: 19px;
    font-weight: bold;
    padding: 3px 14px;
    border-radius: 99px;
    background: #e3f2fd;
    color: #1565c0;
  }
  .canal.arg { background: #e8f5e9; color: #1b5e20; }

  /* ── GRUPOS ── */
  .leyenda {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 22px;
    color: #555;
    margin-bottom: 20px;
  }
  .leyenda span { display: flex; align-items: center; gap: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

  .grupos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .grupo-card {
    border: 2px solid #ccc;
    border-radius: 14px;
    overflow: hidden;
    background: white;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .grupo-titulo {
    background: #1a1a2e;
    color: white;
    padding: 12px 18px;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }
  .grupo-tabla { width: 100%; border-collapse: collapse; }
  .grupo-tabla th {
    padding: 8px 14px;
    font-size: 19px;
    color: #888;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #eee;
    background: #fafafa;
    font-family: Georgia, serif;
  }
  .grupo-tabla th:first-child { text-align: left; }
  .grupo-tabla td {
    padding: 10px 14px;
    font-size: 22px;
    text-align: center;
    border-top: 1px solid #f0f0f0;
  }
  .grupo-tabla td:first-child { text-align: left; }
  .grupo-tabla tr:hover td { background: #f9f9f9; }
  .pos { font-size: 18px; color: #aaa; margin-right: 6px; }
  .c1 { color: #1565c0; font-weight: bold; }
  .c2 { color: #2e7d32; font-weight: bold; }
  .cx { color: #bbb; text-decoration: line-through; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-size: 19px;
    color: #aaa;
    padding: 20px;
    border-top: 1px solid #ddd;
    margin-top: 20px;
  }
  .refresh-btn {
    background: #1a1a2e;
    color: white;
    border: none;
    font-size: 20px;
    font-family: Georgia, serif;
    padding: 8px 24px;
    border-radius: 99px;
    cursor: pointer;
    margin-top: 8px;
  }
  .refresh-btn:hover { background: #0f3460; }
</style>
</head>
<body>

<div class="header">
  <h1>⚽ Mundial 2026</h1>
  <div class="sub">USA · Canadá · México — Fase de grupos</div>
  <div class="upd" id="upd-ts">Cargando datos...</div>
</div>

<div class="nav">
  <button class="active" onclick="showTab('partidos', this)">Partidos</button>
  <button onclick="showTab('grupos', this)">Tablas</button>
</div>

<div id="tab-partidos" class="tab visible">
  <div class="loading">⏳ Consultando resultados...</div>
</div>

<div id="tab-grupos" class="tab">
  <div class="loading">⏳ Calculando tablas...</div>
</div>

<script>
const API_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

// ── Traducciones ──────────────────────────────────────────────────────────────
const NOMBRES = {
  'Mexico':'México','South Africa':'Sudáfrica','South Korea':'Corea del Sur',
  'Czech Republic':'Rep. Checa','Canada':'Canadá','Bosnia and Herzegovina':'Bosnia y Herz.',
  'Bosnia & Herzegovina':'Bosnia y Herz.','Qatar':'Qatar','USA':'EE.UU.',
  'Paraguay':'Paraguay','Switzerland':'Suiza','Brazil':'Brasil','Morocco':'Marruecos',
  'Haiti':'Haití','Scotland':'Escocia','Germany':'Alemania','Curacao':'Curazao',
  'Australia':'Australia','Turkey':'Turquía','Turkiye':'Turquía',
  "Ivory Coast":"Costa de Marfil","Côte d'Ivoire":'Costa de Marfil',
  'Netherlands':'Países Bajos','Japan':'Japón','Sweden':'Suecia','Tunisia':'Túnez',
  'Austria':'Austria','Jordan':'Jordania','Algeria':'Argelia','Portugal':'Portugal',
  'Uzbekistan':'Uzbekistán','Colombia':'Colombia','DR Congo':'Congo DR',
  'England':'Inglaterra','Ghana':'Ghana','Panama':'Panamá','Croatia':'Croacia',
  'Belgium':'Bélgica','Egypt':'Egipto','Iran':'Irán','New Zealand':'Nueva Zelanda',
  'Spain':'España','Cape Verde':'Cabo Verde','Saudi Arabia':'Arabia Saudita',
  'Uruguay':'Uruguay','France':'Francia','Senegal':'Senegal','Iraq':'Irak',
  'Norway':'Noruega','Argentina':'Argentina 🇦🇷',
  'Ecuador':'Ecuador','Cameroon':'Camerún','Serbia':'Serbia','Wales':'Gales',
  'Poland':'Polonia','Denmark':'Dinamarca','Costa Rica':'Costa Rica',
  'Honduras':'Honduras','El Salvador':'El Salvador','Jamaica':'Jamaica',
  'Trinidad and Tobago':'Trinidad y Tobago','Bolivia':'Bolivia','Venezuela':'Venezuela',
  'Chile':'Chile','Peru':'Perú'
};
const tn = n => NOMBRES[n] || n;

// ── Canales ───────────────────────────────────────────────────────────────────
function getCanal(h, a) {
  if (h === 'Argentina' || a === 'Argentina')
    return '<span class="canal arg">TyC Sports / Telefe / TV Pública</span>';
  return '<span class="canal">TyC Sports / DSports</span>';
}

// ── Parseo de hora UTC a Argentina ────────────────────────────────────────────
// El campo time viene como "13:00 UTC-6", "20:00 UTC-5", etc.
function parseToArgentina(dateStr, timeStr) {
  if (!timeStr) return null;
  const m = timeStr.match(/(\d{2}):(\d{2})\s*UTC([+-]\d+)/);
  if (!m) return null;
  const [, hh, mm, offset] = m;
  // Crear fecha UTC
  const utcMs = new Date(`${dateStr}T${hh}:${mm}:00Z`).getTime()
                - parseInt(offset) * 3600000;
  return new Date(utcMs); // UTC timestamp real
}

function argTimeStr(dt) {
  if (!dt) return '—';
  return dt.toLocaleTimeString('es-AR', {
    hour: '2-digit', minute: '2-digit',
    timeZone: 'America/Argentina/Buenos_Aires'
  });
}

function argDateLabel(dt) {
  if (!dt) return '';
  return dt.toLocaleDateString('es-AR', {
    weekday: 'long', day: 'numeric', month: 'long',
    timeZone: 'America/Argentina/Buenos_Aires'
  });
}

function isTodayArg(dt) {
  if (!dt) return false;
  const tz = 'America/Argentina/Buenos_Aires';
  const d = new Date(dt.toLocaleString('en-US', {timeZone: tz}));
  const n = new Date(new Date().toLocaleString('en-US', {timeZone: tz}));
  return d.toDateString() === n.toDateString();
}

function isPastDay(dt) {
  if (!dt) return false;
  const tz = 'America/Argentina/Buenos_Aires';
  const d = new Date(dt.toLocaleString('en-US', {timeZone: tz}));
  const n = new Date(new Date().toLocaleString('en-US', {timeZone: tz}));
  d.setHours(0,0,0,0); n.setHours(0,0,0,0);
  return d < n;
}

// ── Estado de partido ─────────────────────────────────────────────────────────
// openfootball no tiene campo "live", así que lo inferimos por hora + score
function getStatus(match, dt) {
  const hasScore = match.score && match.score.ft;
  //alert('match: ' + JSON.stringify(match) + '\ndt: ' + dt);
  console.log('match:', match, 'dt:', dt);
  if (hasScore) return 'done';
  if (!dt) return 'next';
  const now = Date.now();
  const start = dt.getTime();
  const diff = now - start; // ms desde el inicio
  // Si arrancó hace menos de 115 minutos (90 + descuentos + entretiempo) = en juego
  if (diff > 0 && diff < 115 * 60 * 1000) return 'live';
  if (diff >= 115 * 60 * 1000) return 'done'; // pasó pero sin score aún = pendiente actualización
  return 'next';
}

// ── Render partido ────────────────────────────────────────────────────────────
function renderPartido(match, showCanal) {
  const h = match.team1, a = match.team2;
  const hn = tn(h), an = tn(a);
  const dt = parseToArgentina(match.date, match.time);
  const status = getStatus(match, dt);
  const hasScore = match.score && match.score.ft;

  let pillHtml, marcadorHtml, cls;

  if (status === 'done') {
    const [g1, g2] = hasScore ? match.score.ft : ['?', '?'];
    pillHtml = `<span class="estado-pill pill-done">✓ Finalizado</span>`;
    marcadorHtml = `<div class="marcador">${g1} - ${g2}</div>`;
    cls = 'partido done';
  } else if (status === 'live') {
    // Calcular minuto aproximado
    const minPlayed = dt ? Math.floor((Date.now() - dt.getTime()) / 60000) : '?';
    const minStr = minPlayed > 45 && minPlayed < 60 ? 'ET' : minPlayed > 90 ? '90+' : minPlayed + "'";
    pillHtml = `<span class="estado-pill pill-live">🔴 EN JUEGO · ${minStr}</span>`;
    marcadorHtml = `<div class="marcador">? - ?</div>`;
    cls = 'partido live';
  } else {
    const hora = argTimeStr(dt);
    pillHtml = `<span class="estado-pill pill-next">⏰ ${hora} hs</span>`;
    marcadorHtml = `<div class="marcador hora">${hora}</div>`;
    cls = 'partido next';
  }

  // Goles
  let golesHtml = '';
  if (status === 'done' && (match.goals1?.length || match.goals2?.length)) {
    const g1 = (match.goals1 || []).map(g => `${hn.replace(' 🇦🇷','')}: ${g.name} ${g.minute}'`).join(' · ');
    const g2 = (match.goals2 || []).map(g => `${an.replace(' 🇦🇷','')}: ${g.name} ${g.minute}'`).join(' · ');
    const todos = [g1, g2].filter(Boolean).join(' &nbsp;|&nbsp; ');
    if (todos) golesHtml = `<div class="goles">⚽ ${todos}</div>`;
  }

  const grp = match.group ? match.group.replace('Group ', 'Grupo ') : '';
  const venue = match.ground || '';
  const meta = [grp, venue].filter(Boolean).join(' · ');
  const canal = showCanal ? getCanal(h, a) : '';

  return `<div class="${cls}">
    ${pillHtml}
    <div class="partido-fila">
      <div class="equipo">${hn}</div>
      ${marcadorHtml}
      <div class="equipo der">${an}</div>
    </div>
    ${golesHtml}
    <div class="partido-meta">
      <span>${meta}</span>
      ${canal}
    </div>
  </div>`;
}

// ── Render pestaña Partidos ───────────────────────────────────────────────────
function renderPartidos(matches) {
  // Parsear y ordenar
  const enriched = matches.map(m => ({
    ...m,
    _dt: parseToArgentina(m.date, m.time)
  })).sort((a, b) => (a._dt || 0) - (b._dt || 0));

  // Agrupar por día Argentina
  const byDay = new Map();
  enriched.forEach(m => {
    const label = m._dt ? argDateLabel(m._dt) : m.date;
    const key = m._dt ? m._dt.toLocaleDateString('en-US', {timeZone:'America/Argentina/Buenos_Aires'}) : m.date;
    if (!byDay.has(key)) byDay.set(key, { label, matches: [], dt: m._dt });
    byDay.get(key).matches.push(m);
  });

  let html = '';
  let todayKey = null;

  byDay.forEach(({ label, matches: ms, dt }, key) => {
    const esHoy = dt && isTodayArg(dt);
    const esPasado = dt && isPastDay(dt);
    if (esHoy) todayKey = key;

    const labelCap = label.charAt(0).toUpperCase() + label.slice(1);
    const suffix = esHoy ? ' — HOY' : esPasado ? '' : '';
    const idAttr = esHoy ? 'id="hoy-anchor"' : '';

    html += `<div class="dia-bloque" ${idAttr}>
      <div class="dia-titulo${esHoy ? ' hoy' : ''}">${labelCap}${suffix}</div>`;
    ms.forEach(m => { html += renderPartido(m, esHoy); });
    html += `</div>`;
  });

  html += `<div class="footer">
    Fuente: openfootball/worldcup.json · Se actualiza automáticamente
    <br><button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar ahora</button>
  </div>`;

  document.getElementById('tab-partidos').innerHTML = html;

  // Scroll al día de hoy
  if (todayKey) {
    setTimeout(() => {
      const el = document.getElementById('hoy-anchor');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
  }
}

// ── Calcular standings desde resultados ───────────────────────────────────────
function calcularGrupos(matches) {
  const grupos = {};

  matches.forEach(m => {
    const grp = m.group;
    if (!grp) return;
    if (!grupos[grp]) grupos[grp] = {};

    const h = m.team1, a = m.team2;
    if (!grupos[grp][h]) grupos[grp][h] = {pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
    if (!grupos[grp][a]) grupos[grp][a] = {pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};

    const sc = m.score?.ft;
    if (!sc) return; // partido sin resultado todavía

    const [g1, g2] = sc;
    grupos[grp][h].pj++; grupos[grp][h].gf += g1; grupos[grp][h].gc += g2;
    grupos[grp][a].pj++; grupos[grp][a].gf += g2; grupos[grp][a].gc += g1;

    if (g1 > g2) {
      grupos[grp][h].pts += 3; grupos[grp][h].g++;
      grupos[grp][a].p++;
    } else if (g2 > g1) {
      grupos[grp][a].pts += 3; grupos[grp][a].g++;
      grupos[grp][h].p++;
    } else {
      grupos[grp][h].pts++; grupos[grp][h].e++;
      grupos[grp][a].pts++; grupos[grp][a].e++;
    }
  });

  return grupos;
}

// ── Render pestaña Grupos ─────────────────────────────────────────────────────
function renderGrupos(matches) {
  const grupos = calcularGrupos(matches);

  let html = `<div class="leyenda">
    <span><span class="dot" style="background:#1565c0"></span> 1° clasifica</span>
    <span><span class="dot" style="background:#2e7d32"></span> 2° clasifica</span>
    <span><span class="dot" style="background:#ccc"></span> Eliminado</span>
  </div><div class="grupos-grid">`;

  const ordenGrupos = Object.keys(grupos).sort();

  ordenGrupos.forEach(grpKey => {
    const equipos = grupos[grpKey];
    const sorted = Object.entries(equipos).sort((a, b) => {
      const [, sa] = a, [, sb] = b;
      if (sb.pts !== sa.pts) return sb.pts - sa.pts;
      const dgA = sa.gf - sa.gc, dgB = sb.gf - sb.gc;
      if (dgB !== dgA) return dgB - dgA;
      return sb.gf - sa.gf;
    });

    const nombre = grpKey.replace('Group ', 'Grupo ');
    const hasArg = sorted.some(([t]) => t === 'Argentina');

    html += `<div class="grupo-card">
      <div class="grupo-titulo">${nombre}${hasArg ? ' 🇦🇷' : ''}</div>
      <table class="grupo-tabla">
        <tr><th>Selección</th><th>PJ</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th></tr>`;

    sorted.forEach(([team, s], i) => {
      const maxPJ = Math.max(...sorted.map(([,x]) => x.pj));
      let cls = '';
      if (i === 0) cls = 'c1';
      else if (i === 1) cls = 'c2';
      else if (s.pj >= 2 && s.pts === 0 && s.pj === maxPJ) cls = 'cx';

      const dg = s.gf - s.gc;
      const dgStr = dg > 0 ? `+${dg}` : `${dg}`;

      html += `<tr>
        <td><span class="pos">${i+1}</span><span class="${cls}">${tn(team)}</span></td>
        <td>${s.pj}</td><td>${s.gf}</td><td>${s.gc}</td><td>${dgStr}</td><td><strong>${s.pts}</strong></td>
      </tr>`;
    });

    html += `</table></div>`;
  });

  html += `</div><div class="footer">
    Tablas calculadas en base a los resultados disponibles
    <br><button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar ahora</button>
  </div>`;

  document.getElementById('tab-grupos').innerHTML = html;
}

// ── Tab switcher ──────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('visible'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('visible');
  btn.classList.add('active');
}

// ── Carga de datos ────────────────────────────────────────────────────────────
async function cargarDatos() {
  document.getElementById('upd-ts').textContent = 'Actualizando...';
  try {
    const res = await fetch(API_URL + '?t=' + Date.now()); // cache bust
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const matches = data.matches || [];
    if (!matches.length) throw new Error('No se encontraron partidos en la respuesta');

    renderPartidos(matches);
    renderGrupos(matches);

    const now = new Date().toLocaleString('es-AR', {
      timeZone: 'America/Argentina/Buenos_Aires',
      day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
    });
    document.getElementById('upd-ts').textContent = `Actualizado: ${now}`;
  } catch(e) {
    const msg = `<div class="error">❌ No se pudo conectar con la fuente de datos.<br><small>${e.message}</small><br><br><button class="refresh-btn" onclick="cargarDatos()">↻ Reintentar</button></div>`;
    document.getElementById('tab-partidos').innerHTML = msg;
    document.getElementById('tab-grupos').innerHTML = msg;
    document.getElementById('upd-ts').textContent = 'Error al cargar';
  }
}

// ── Iniciar ───────────────────────────────────────────────────────────────────
cargarDatos();

// Auto-refresh cada 3 minutos
