const ARG_TEAMS = ['ARG','Argentina 🇦🇷'];
const TODAY_IDS = ['sr:sport_event:66457024','sr:sport_event:66457034','sr:sport_event:66457046','sr:sport_event:66457048','sr:sport_event:66457036'];

function isArg(h,a) { return h==='ARG'||a==='ARG'; }

function canal(h,a) {
  if(isArg(h,a)) return `<span class="canal arg"><i class="ti ti-tv" aria-hidden="true"></i> TyC / Telefe / TV Pública</span>`;
  return `<span class="canal"><i class="ti ti-tv" aria-hidden="true"></i> TyC Sports / DSports</span>`;
}

function pill(status) {
  if(status==='final') return `<span class="pill p-done"><i class="ti ti-check" aria-hidden="true"></i> Finalizado</span>`;
  if(status==='in_progress') return `<span class="pill p-live"><i class="ti ti-radio" aria-hidden="true"></i> En juego</span>`;
  return `<span class="pill p-next"><i class="ti ti-clock" aria-hidden="true"></i> Próximo</span>`;
}

function mcClass(status) {
  if(status==='final') return 'mc done';
  if(status==='in_progress') return 'mc live';
  return 'mc upcoming';
}

function scoreOrTime(g) {
  if(g.status==='final'||g.status==='in_progress') {
    return `<div class="sb">${g.score[g.home]} - ${g.score[g.away]}</div>`;
  }
  const t = g.local_start.split(', ')[1] || '';
  return `<div class="sb t">${t}</div>`;
}

function card(g, showCanal) {
  const hn = g.teams[g.home].name;
  const an = g.teams[g.away].name;
  return `<div class="${mcClass(g.status)}">
    ${pill(g.status)}
    <div class="mrow">
      <div class="tn">${hn}</div>
      ${scoreOrTime(g)}
      <div class="tn r">${an}</div>
    </div>
    <div class="mf">
      <span>${g.local_start}</span>
      ${showCanal ? canal(g.home,g.away) : ''}
    </div>
  </div>`;
}

function renderHoy() {
  const todayGames = GAMES.filter(g => TODAY_IDS.includes(g.id));
  const sorted = todayGames.sort((a,b) => new Date(a.start_time)-new Date(b.start_time));
  let html = `<div style="text-align:center"><span class="badge">Martes 23 de junio · ${sorted.length} partidos</span></div>`;
  html += sorted.map(g => card(g, true)).join('');
  html += `<div class="upd">Datos al momento de la consulta · <button style="background:none;border:none;color:var(--color-text-secondary);font-size:11px;cursor:pointer;text-decoration:underline" onclick="sendPrompt('Actualiza los resultados del mundial de hoy')">Pedirme actualización ↗</button></div>`;
  document.getElementById('s-hoy').innerHTML = html;
}

function renderFixture() {
  const sorted = [...GAMES].sort((a,b) => new Date(a.start_time)-new Date(b.start_time));
  const byDay = {};
  sorted.forEach(g => {
    const day = g.local_start.split(',')[0];
    if(!byDay[day]) byDay[day] = [];
    byDay[day].push(g);
  });
  let html = '';
  const todayDay = 'Mar 23 Jun';
  Object.entries(byDay).forEach(([day, games]) => {
    const isT = day === todayDay;
    html += `<div class="dh">${day}${isT ? ' — HOY' : ''}</div>`;
    html += games.map(g => card(g, isT)).join('');
  });
  document.getElementById('s-fixture').innerHTML = html;
}

function renderGrupos() {
  const groups = {};
  STANDINGS.forEach(t => {
    if(!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });
  let html = `<div class="ley">
    <span><span class="dot" style="background:#1565C0"></span> 1° clasifica</span>
    <span><span class="dot" style="background:#2E7D32"></span> 2° clasifica</span>
    <span><span class="dot" style="background:#999"></span> Eliminado</span>
  </div><div class="gg">`;
  Object.entries(groups).sort().forEach(([g, teams]) => {
    const isArgGroup = teams.some(t => t.team.name.includes('Argentina'));
    html += `<div class="gc"><div class="gt-title">Grupo ${g}${isArgGroup?' 🇦🇷':''}</div>
      <table class="gt"><tr><th>Selección</th><th>PJ</th><th>PTS</th></tr>`;
    teams.forEach((t,i) => {
      const pj = t.wins + t.losses + t.draws;
      let cls = '';
      if(i===0) cls='c1'; else if(i===1) cls='c2'; else if(pj>=2&&t.points===0) cls='cx';
      html += `<tr><td><span class="pn">${i+1}</span><span class="${cls}">${t.team.name}</span></td><td>${pj}</td><td>${t.points}</td></tr>`;
    });
    html += '</table></div>';
  });
  html += '</div>';
  document.getElementById('s-grupos').innerHTML = html;
}

function show(sec, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('s-'+sec).classList.add('visible');
  btn.classList.add('active');
}

renderHoy();
renderFixture();
renderGrupos();
</script>
