
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans, system-ui, sans-serif);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-size: 24px;
  }

  .header {
    text-align: center;
    padding: 1.2rem 0.5rem 0.6rem;
    border-bottom: 1px solid var(--color-border-tertiary);
  }
  .header h1 { font-size: 32px; font-weight: 600; }
  .header p { font-size: 24px; color: var(--color-text-secondary); margin-top: 4px; }

  .nav {
    display: flex;
    gap: 12px;
    justify-content: center;
    padding: 1rem;
    border-bottom: 1px solid var(--color-border-tertiary);
  }
  .nav button {
    font-size: 26px;
    padding: 10px 28px;
    border-radius: 99px;
    border: 1.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer;
    font-family: inherit;
  }
  .nav button.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }

  .tab { display: none; padding: 1rem; }
  .tab.visible { display: block; }

  /* PARTIDOS */
  .dia-bloque { margin-bottom: 1.8rem; }
  .dia-titulo {
    font-size: 26px;
    font-weight: 600;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 0 8px;
    border-bottom: 2px solid var(--color-border-secondary);
    margin-bottom: 12px;
  }
  .dia-titulo.hoy { color: #1B5E20; }

  .partido {
    border: 2px solid var(--color-border-secondary);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 14px;
    background: var(--color-background-primary);
  }
  .partido.live { border-color: #C62828; border-width: 3px; }
  .partido.done { opacity: 0.78; }
  .partido.next { border-color: var(--color-border-tertiary); }

  .partido-estado {
    font-size: 22px;
    font-weight: 600;
    padding: 3px 14px;
    border-radius: 99px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .estado-done { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
  .estado-live { background: #FFEBEE; color: #C62828; }
  .estado-next { background: #E3F2FD; color: #1565C0; }

  .partido-fila {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .equipo {
    flex: 1;
    font-size: 28px;
    font-weight: 600;
    color: var(--color-text-primary);
  }
  .equipo.der { text-align: right; }

  .marcador {
    background: var(--color-background-secondary);
    border-radius: 12px;
    padding: 8px 20px;
    font-size: 32px;
    font-weight: 700;
    min-width: 100px;
    text-align: center;
    color: var(--color-text-primary);
  }
  .marcador.hora {
    font-size: 26px;
    color: var(--color-text-secondary);
    font-weight: 500;
  }

  .partido-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--color-border-tertiary);
    font-size: 22px;
    color: var(--color-text-secondary);
    flex-wrap: wrap;
    gap: 6px;
  }
  .canal-badge {
    font-size: 21px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 99px;
    background: #E3F2FD;
    color: #1565C0;
  }
  .canal-badge.arg { background: #E8F5E9; color: #1B5E20; }

  /* GRUPOS */
  .grupos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 18px;
  }
  .grupo-card {
    border: 2px solid var(--color-border-secondary);
    border-radius: 16px;
    overflow: hidden;
  }
  .grupo-titulo {
    background: var(--color-background-secondary);
    padding: 12px 18px;
    font-size: 28px;
    font-weight: 700;
    border-bottom: 1px solid var(--color-border-tertiary);
  }
  .grupo-tabla {
    width: 100%;
    border-collapse: collapse;
  }
  .grupo-tabla th {
    padding: 8px 14px;
    font-size: 21px;
    color: var(--color-text-tertiary);
    font-weight: 500;
    text-align: center;
    border-bottom: 1px solid var(--color-border-tertiary);
  }
  .grupo-tabla th:first-child { text-align: left; }
  .grupo-tabla td {
    padding: 10px 14px;
    font-size: 24px;
    text-align: center;
    border-top: 1px solid var(--color-border-tertiary);
    color: var(--color-text-primary);
  }
  .grupo-tabla td:first-child { text-align: left; }
  .pos { font-size: 20px; color: var(--color-text-tertiary); margin-right: 6px; }
  .c1 { color: #1565C0; font-weight: 700; }
  .c2 { color: #2E7D32; font-weight: 700; }
  .cx { color: var(--color-text-tertiary); text-decoration: line-through; }

  .leyenda {
    display: flex; gap: 20px; flex-wrap: wrap;
    justify-content: center;
    font-size: 22px;
    color: var(--color-text-secondary);
    margin-bottom: 1rem;
  }
  .leyenda span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

  /* Estado general */
  .loading, .error {
    text-align: center;
    padding: 3rem 1rem;
    font-size: 26px;
    color: var(--color-text-secondary);
  }
  .error { color: #C62828; background: #FFEBEE; border-radius: 12px; }

  .upd {
    text-align: center;
    font-size: 21px;
    color: var(--color-text-tertiary);
    margin-top: 1.2rem;
    padding-bottom: 1rem;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚽ Mundial 2026</h1>
  <p id="upd-ts">Cargando...</p>
</div>

<div class="nav">
  <button class="active" onclick="showTab('partidos', this)">Partidos</button>
  <button onclick="showTab('grupos', this)">Tablas</button>
</div>

<div id="tab-partidos" class="tab visible">
  <div class="loading">⏳ Cargando partidos...</div>
</div>

<div id="tab-grupos" class="tab">
  <div class="loading">⏳ Cargando grupos...</div>
</div>

<script>
// ── Traducciones de equipos ──────────────────────────────────────────────────
const T = {
  'Argentina':'Argentina 🇦🇷','Brazil':'Brasil','France':'Francia','Germany':'Alemania',
  'Spain':'España','Portugal':'Portugal','Netherlands':'Países Bajos','England':'Inglaterra',
  'USA':'EE.UU.','Mexico':'México','Canada':'Canadá','Japan':'Japón',
  'Korea Republic':'Corea del Sur','South Korea':'Corea del Sur',
  'Morocco':'Marruecos','Senegal':'Senegal','Ecuador':'Ecuador','Uruguay':'Uruguay',
  'Colombia':'Colombia','Switzerland':'Suiza','Belgium':'Bélgica','Croatia':'Croacia',
  'Sweden':'Suecia','Norway':'Noruega','Austria':'Austria',
  'Czech Republic':'Rep. Checa','Czechia':'Rep. Checa',
  'Turkey':'Turquía','Turkiye':'Turquía',
  'Saudi Arabia':'Arabia Saudita','Iran':'Irán','IR Iran':'Irán','Iraq':'Irak',
  'Jordan':'Jordania','Qatar':'Qatar','Uzbekistan':'Uzbekistán',
  'Australia':'Australia','New Zealand':'Nueva Zelanda',
  'South Africa':'Sudáfrica','Algeria':'Argelia','Tunisia':'Túnez','Egypt':'Egipto',
  "Côte d'Ivoire":'Costa de Marfil','Ivory Coast':'Costa de Marfil',
  'Ghana':'Ghana','Cape Verde':'Cabo Verde',
  'DR Congo':'Congo DR','Congo DR':'Congo DR','Haiti':'Haití',
  'Panama':'Panamá','Paraguay':'Paraguay','Bolivia':'Bolivia',
  'Jamaica':'Jamaica','Honduras':'Honduras','Costa Rica':'Costa Rica',
  'Curacao':'Curazao','Curaçao':'Curazao',
  'Bosnia and Herzegovina':'Bosnia y Herz.','Bosnia & Herzegovina':'Bosnia y Herz.',
  'Scotland':'Escocia','Wales':'Gales'
};
const tn = n => T[n] || n;

// ── Horarios Argentina ───────────────────────────────────────────────────────
const TZ = 'America/Argentina/Buenos_Aires';

function argTime(utc) {
  return new Date(utc).toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit', timeZone: TZ });
}
function argDateKey(utc) {
  return new Date(utc).toLocaleDateString('es-AR', {
    weekday:'long', day:'numeric', month:'long', timeZone: TZ
  });
}
function isToday(utc) {
  const d = new Date(new Date(utc).toLocaleString('en-US',{timeZone:TZ}));
  const n = new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  return d.toDateString() === n.toDateString();
}
function isPast(utc) {
  const d = new Date(new Date(utc).toLocaleString('en-US',{timeZone:TZ}));
  const n = new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  return d < n && !isToday(utc);
}

// ── Helpers de partido ───────────────────────────────────────────────────────
function getStatus(g) {
  const s = (g.status || g.matchStatus || g.state || '').toLowerCase();
  if (/progress|live|playing/.test(s)) return 'live';
  if (/finish|final|ended|complete|closed|full.time|ft/.test(s)) return 'done';
  return 'next';
}

function getScore(g) {
  if (g.score?.home !== undefined) return [g.score.home, g.score.away];
  if (g.homeScore !== undefined) return [g.homeScore, g.awayScore];
  if (g.home_score !== undefined) return [g.home_score, g.away_score];
  if (g.goals?.home !== undefined) return [g.goals.home ?? 0, g.goals.away ?? 0];
  return [0, 0];
}

function getTeams(g) {
  const h = g.homeTeam?.name || g.home_team?.name || g.home?.name || g.home || '';
  const a = g.awayTeam?.name || g.away_team?.name || g.away?.name || g.away || '';
  return [h, a];
}

function getKO(g) {
  return g.date || g.kickoff || g.datetime || g.scheduled || g.start_time || g.fixture?.date || '';
}

function getGroup(g) {
  return g.group || g.groupName || g.league?.round || g.round || '';
}

function getMinute(g) {
  return g.minute || g.matchMinute || g.elapsed || g.clock?.played || null;
}

function isArgGame(h, a) { return h === 'Argentina' || a === 'Argentina'; }

// ── Render de un partido ─────────────────────────────────────────────────────
function renderPartido(g, showCanal) {
  const [horig, aorig] = getTeams(g);
  const h = tn(horig), a = tn(aorig);
  const st = getStatus(g);
  const ko = getKO(g);
  const [hs, as_] = getScore(g);
  const min = getMinute(g);
  const grp = getGroup(g);
  const venue = g.venue?.name || g.stadium?.name || g.stadium || '';
  const meta = [grp ? 'Grupo ' + grp : '', venue].filter(Boolean).join(' · ');

  let estadoHtml, marcadorHtml, cls;
  if (st === 'live') {
    estadoHtml = `<span class="partido-estado estado-live">🔴 En juego${min ? ' · min '+min+"'" : ''}</span>`;
    marcadorHtml = `<div class="marcador">${hs} - ${as_}</div>`;
    cls = 'partido live';
  } else if (st === 'done') {
    estadoHtml = `<span class="partido-estado estado-done">✓ Finalizado</span>`;
    marcadorHtml = `<div class="marcador">${hs} - ${as_}</div>`;
    cls = 'partido done';
  } else {
    const hora = ko ? argTime(ko) : '—';
    estadoHtml = `<span class="partido-estado estado-next">⏰ ${hora}</span>`;
    marcadorHtml = `<div class="marcador hora">${hora}</div>`;
    cls = 'partido next';
  }

  const canalHtml = showCanal
    ? isArgGame(horig, aorig)
      ? `<span class="canal-badge arg">TyC / Telefe / TV Pública</span>`
      : `<span class="canal-badge">TyC Sports / DSports</span>`
    : '';

  return `<div class="${cls}">
    ${estadoHtml}
    <div class="partido-fila">
      <div class="equipo">${h}</div>
      ${marcadorHtml}
      <div class="equipo der">${a}</div>
    </div>
    <div class="partido-meta">
      <span>${meta}</span>
      ${canalHtml}
    </div>
  </div>`;
}

// ── Render pestaña partidos ──────────────────────────────────────────────────
function renderPartidos(games) {
  const sorted = [...games].sort((a,b) => new Date(getKO(a)) - new Date(getKO(b)));

  const byDay = new Map();
  sorted.forEach(g => {
    const ko = getKO(g);
    if (!ko) return;
    const key = argDateKey(ko);
    if (!byDay.has(key)) byDay.set(key, []);
    byDay.get(key).push(g);
  });

  let html = '';
  let todayId = null;

  byDay.forEach((gs, dayLabel) => {
    const ko = getKO(gs[0]);
    const esHoy = isToday(ko);
    const esAntes = isPast(ko);
    const id = esHoy ? 'hoy-anchor' : '';
    if (esHoy) todayId = 'hoy-anchor';

    const label = dayLabel.charAt(0).toUpperCase() + dayLabel.slice(1);
    html += `<div class="dia-bloque" ${id ? 'id="'+id+'"' : ''}>
      <div class="dia-titulo${esHoy ? ' hoy' : ''}">${label}${esHoy ? ' — HOY' : esAntes ? ' ✓' : ''}</div>`;
    gs.forEach(g => {
      html += renderPartido(g, esHoy || isToday(getKO(g)));
    });
    html += '</div>';
  });

  html += `<div class="upd">Actualizado: ${new Date().toLocaleTimeString('es-AR')}</div>`;

  document.getElementById('tab-partidos').innerHTML = html;

  if (todayId) {
    setTimeout(() => {
      const el = document.getElementById(todayId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }
}

// ── Render pestaña grupos ────────────────────────────────────────────────────
function renderGrupos(groups) {
  let html = `<div class="leyenda">
    <span><span class="dot" style="background:#1565C0"></span>1° clasifica</span>
    <span><span class="dot" style="background:#2E7D32"></span>2° clasifica</span>
    <span><span class="dot" style="background:#aaa"></span>Eliminado</span>
  </div><div class="grupos-grid">`;

  groups.forEach(g => {
    const name = g.name || g.group || g.groupName || '?';
    const teams = g.teams || g.standings || g.table || g.team_standings || [];
    const hasArg = teams.some(t => (t.team?.name || t.name || '') === 'Argentina');

    html += `<div class="grupo-card">
      <div class="grupo-titulo">Grupo ${name}${hasArg ? ' 🇦🇷' : ''}</div>
      <table class="grupo-tabla">
        <tr><th>Selección</th><th>PJ</th><th>GF</th><th>GC</th><th>PTS</th></tr>`;

    teams.forEach((t, i) => {
      const nm = tn(t.team?.name || t.name || t.teamName || '?');
      const pj = t.played ?? t.matchesPlayed ?? t.gamesPlayed ?? ((t.wins||0)+(t.draws||0)+(t.losses||0));
      const gf = t.goalsFor ?? t.goals_for ?? t.scored ?? 0;
      const gc = t.goalsAgainst ?? t.goals_against ?? t.conceded ?? 0;
      const pts = t.points ?? t.pts ?? 0;
      let cls = '';
      if (i === 0) cls = 'c1';
      else if (i === 1) cls = 'c2';
      else if (pj >= 2 && pts === 0) cls = 'cx';

      html += `<tr>
        <td><span class="pos">${i+1}</span><span class="${cls}">${nm}</span></td>
        <td>${pj}</td><td>${gf}</td><td>${gc}</td><td>${pts}</td>
      </tr>`;
    });

    html += '</table></div>';
  });

  html += `</div><div class="upd">Actualizado: ${new Date().toLocaleTimeString('es-AR')}</div>`;
  document.getElementById('tab-grupos').innerHTML = html;
}

// ── Parseo flexible de respuesta ─────────────────────────────────────────────
function extractArray(data) {
  if (Array.isArray(data)) return data;
  for (const key of ['games','matches','data','fixtures','results','items']) {
    if (Array.isArray(data[key])) return data[key];
  }
  return [];
}

function extractGroups(data) {
  if (Array.isArray(data)) return data;
  for (const key of ['groups','standings','data','items']) {
    if (Array.isArray(data[key])) return data[key];
  }
  return [];
}

// ── Carga de datos ───────────────────────────────────────────────────────────
const APIS = [
  {
    games: 'https://worldcup26.ir/get/games',
    groups: 'https://worldcup26.ir/get/groups',
    name: 'worldcup26.ir'
  }
];

async function tryFetch(url) {
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error(`HTTP ${res.status} en ${url}`);
  return res.json();
}

async function loadData() {
  let lastError = null;
  for (const api of APIS) {
    try {
      const [gamesRaw, groupsRaw] = await Promise.all([
        tryFetch(api.games),
        tryFetch(api.groups)
      ]);
      const games = extractArray(gamesRaw);
      const groups = extractGroups(groupsRaw);
      if (!games.length && !groups.length) throw new Error('Respuesta vacía');
      return { games, groups };
    } catch(e) {
      lastError = e;
      console.warn('API falló:', api.name, e.message);
    }
  }
  throw lastError;
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const { games, groups } = await loadData();
    renderPartidos(games);
    renderGrupos(groups);
    document.getElementById('upd-ts').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
  } catch(e) {
    const msg = `<div class="error">❌ No se pudo cargar la API: ${e.message}</div>`;
    document.getElementById('tab-partidos').innerHTML = msg;
    document.getElementById('tab-grupos').innerHTML = msg;
    document.getElementById('upd-ts').textContent = 'Error al cargar';
  }
}

// ── Tab switcher ─────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('visible'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('visible');
  btn.classList.add('active');
}

// ── Auto-refresh cada 60s ────────────────────────────────────────────────────
init();
setInterval(async () => {
  try {
    const { games, groups } = await loadData();
    renderPartidos(games);
    renderGrupos(groups);
    document.getElementById('upd-ts').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
  } catch(e) { /* silencioso */ }
}, 60000);
</script>
</body>
</html>
