<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Mundial 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f5f0;
    color: #1a1a1a;
    line-height: 1.4;
  }

  /* ── HEADER ── */
  .header {
    background: #1a1a2e;
    color: white;
    text-align: center;
    padding: 24px 16px 16px;
  }
  .header h1 { font-size: 40px; font-weight: bold; letter-spacing: 1px; }
  .header .sub { font-size: 22px; color: #aab; margin-top: 4px; }
  .header .upd { font-size: 18px; color: #889; margin-top: 8px; min-height: 24px; }

  /* ── NAV ── */
  .nav {
    display: flex;
    justify-content: center;
    background: #16213e;
    border-bottom: 3px solid #0f3460;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav button {
    font-size: 26px;
    font-family: Georgia, serif;
    padding: 16px 48px;
    border: none;
    background: transparent;
    color: #aab;
    cursor: pointer;
    border-bottom: 4px solid transparent;
    transition: all 0.2s;
  }
  .nav button.active {
    color: white;
    border-bottom: 4px solid #e94560;
    background: #1a1a2e;
  }
  .nav button:hover:not(.active) { color: white; background: #1a1a2e88; }

  /* ── TABS ── */
  .tab { display: none; padding: 24px 20px 120px; max-width: 900px; margin: 0 auto; }
  .tab.visible { display: block; }

  /* ── LOADING / ERROR ── */
  .loading { text-align: center; padding: 60px 20px; font-size: 26px; color: #888; }
  .error-msg {
    text-align: center; padding: 28px; font-size: 22px;
    color: #c62828; background: #ffebee;
    border: 2px solid #ef9a9a; border-radius: 12px; margin: 20px 0;
  }

  /* ── DÍA ── */
  .dia-bloque { margin-bottom: 32px; }
  .dia-titulo {
    font-size: 24px; font-weight: bold; color: #666;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 10px 0 8px;
    border-bottom: 2px solid #ccc;
    margin-bottom: 14px;
  }
  .dia-titulo.hoy { color: #1b5e20; border-bottom-color: #2e7d32; font-size: 26px; }

  /* ── PARTIDO ── */
  .partido {
    border: 2px solid #ddd;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 14px;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .partido.live   { border: 3px solid #c62828; box-shadow: 0 2px 14px rgba(198,40,40,0.18); }
  .partido.paused { border: 3px solid #e65100; box-shadow: 0 2px 14px rgba(230,81,0,0.15); }
  .partido.done   { background: #fafafa; border-color: #e0e0e0; }
  .partido.next   { border-color: #bbdefb; background: #f8fbff; }

  .estado-pill {
    display: inline-block; font-size: 20px; font-weight: bold;
    padding: 4px 16px; border-radius: 99px; margin-bottom: 12px;
  }
  .pill-done   { background: #f0f0f0; color: #777; }
  .pill-live   { background: #ffebee; color: #c62828; }
  .pill-paused { background: #fff3e0; color: #e65100; }
  .pill-next   { background: #e3f2fd; color: #1565c0; }

  .partido-fila { display: flex; align-items: center; gap: 16px; }
  .equipo { flex: 1; font-size: 28px; font-weight: bold; color: #1a1a1a; }
  .equipo.der { text-align: right; }

  .marcador {
    background: #1a1a2e; color: white;
    border-radius: 12px; padding: 10px 22px;
    font-size: 36px; font-weight: bold;
    min-width: 110px; text-align: center; letter-spacing: 2px;
  }
  .marcador.live-score  { background: #c62828; }
  .marcador.paused-score { background: #e65100; }
  .marcador.hora { background: #e3f2fd; color: #1565c0; font-size: 26px; letter-spacing: 1px; }

  .partido-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid #eee;
    font-size: 20px; color: #888;
    flex-wrap: wrap; gap: 8px;
  }
  .canal {
    font-size: 19px; font-weight: bold;
    padding: 3px 14px; border-radius: 99px;
    background: #e3f2fd; color: #1565c0;
  }
  .canal.arg { background: #e8f5e9; color: #1b5e20; }

  /* ── GRUPOS ── */
  .leyenda {
    display: flex; gap: 24px; flex-wrap: wrap;
    justify-content: center;
    font-size: 22px; color: #555;
    margin-bottom: 20px;
  }
  .leyenda span { display: flex; align-items: center; gap: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

  .grupos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .grupo-card {
    border: 2px solid #ccc; border-radius: 14px;
    overflow: hidden; background: white;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .grupo-titulo {
    background: #1a1a2e; color: white;
    padding: 12px 18px; font-size: 26px; font-weight: bold;
  }
  .grupo-tabla { width: 100%; border-collapse: collapse; }
  .grupo-tabla th {
    padding: 8px 14px; font-size: 19px; color: #888;
    font-weight: bold; text-align: center;
    border-bottom: 1px solid #eee; background: #fafafa;
    font-family: Georgia, serif;
  }
  .grupo-tabla th:first-child { text-align: left; }
  .grupo-tabla td {
    padding: 10px 14px; font-size: 22px;
    text-align: center; border-top: 1px solid #f0f0f0;
  }
  .grupo-tabla td:first-child { text-align: left; }
  .grupo-tabla tr:hover td { background: #f9f9f9; }
  .pos { font-size: 18px; color: #aaa; margin-right: 6px; }
  .c1 { color: #1565c0; font-weight: bold; }
  .c2 { color: #2e7d32; font-weight: bold; }
  .cx { color: #bbb; text-decoration: line-through; }

  /* ── FOOTER ── */
  .footer {
    text-align: center; font-size: 19px; color: #aaa;
    padding: 20px; border-top: 1px solid #ddd; margin-top: 20px;
  }
  .refresh-btn {
    background: #1a1a2e; color: white; border: none;
    font-size: 20px; font-family: Georgia, serif;
    padding: 8px 24px; border-radius: 99px;
    cursor: pointer; margin-top: 8px;
  }
  .refresh-btn:hover { background: #0f3460; }

  /* ── BOTONES FLOTANTES ── */
  .fab-container {
    position: fixed; bottom: 28px; right: 24px;
    display: flex; flex-direction: column; gap: 14px;
    z-index: 1000;
  }
  .fab {
    padding: 14px 22px; border-radius: 99px; border: none;
    font-size: 22px; font-family: Georgia, serif; font-weight: bold;
    cursor: pointer; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.32); }
  .fab-hoy { background: #1b5e20; color: white; }
  .fab-arg { background: #74acdf; color: #1a1a2e; }
  .fab-arg.en-juego { background: #c62828; color: white; animation: pulso 1.5s infinite; }
  .fab.oculto { display: none; }

  @keyframes pulso {
    0%, 100% { box-shadow: 0 4px 16px rgba(198,40,40,0.4); }
    50%       { box-shadow: 0 4px 28px rgba(198,40,40,0.85); }
  }
</style>
</head>
<body>

<!-- BOTONES FLOTANTES -->
<div class="fab-container">
  <button class="fab fab-arg oculto" id="fab-arg" onclick="irAArgentina()">🇦🇷 Argentina</button>
  <button class="fab fab-hoy oculto" id="fab-hoy" onclick="irAHoy()">📅 Ir a hoy</button>
</div>

<div class="header">
  <h1>⚽ Mundial 2026</h1>
  <div class="sub">USA · Canadá · México</div>
  <div class="upd" id="upd-ts">Cargando...</div>
</div>

<div class="nav">
  <button class="active" onclick="showTab('partidos', this)">Partidos</button>
  <button onclick="showTab('grupos', this)">Tablas</button>
</div>

<div id="tab-partidos" class="tab visible">
  <div class="loading">⏳ Consultando API...</div>
</div>
<div id="tab-grupos" class="tab">
  <div class="loading">⏳ Cargando tablas...</div>
</div>

<script>
const PROXY = 'https://mundial-proxy.ugmartin.workers.dev';
const TZ    = 'America/Argentina/Buenos_Aires';

// ── TRADUCCIONES ──────────────────────────────────────────────────────────────
const NOMBRES = {
  'Mexico':'México','South Africa':'Sudáfrica','South Korea':'Corea del Sur',
  'Czech Republic':'Rep. Checa','Czechia':'Rep. Checa',
  'Canada':'Canadá','Bosnia and Herzegovina':'Bosnia y Herz.',
  'USA':'EE.UU.','Paraguay':'Paraguay','Haiti':'Haití','Scotland':'Escocia',
  'Australia':'Australia','Türkiye':'Turquía','Turkey':'Turquía',
  'Brazil':'Brasil','Morocco':'Marruecos','Qatar':'Qatar','Switzerland':'Suiza',
  "Côte d'Ivoire":'Costa de Marfil','Ivory Coast':'Costa de Marfil',
  'Ecuador':'Ecuador','Germany':'Alemania','Curaçao':'Curazao',
  'Netherlands':'Países Bajos','Japan':'Japón','Sweden':'Suecia','Tunisia':'Túnez',
  'Saudi Arabia':'Arabia Saudita','Uruguay':'Uruguay','Spain':'España',
  'Cape Verde':'Cabo Verde','Iran':'Irán','New Zealand':'Nueva Zelanda',
  'Belgium':'Bélgica','Egypt':'Egipto','France':'Francia','Senegal':'Senegal',
  'Iraq':'Irak','Norway':'Noruega','Argentina':'Argentina 🇦🇷','Algeria':'Argelia',
  'Austria':'Austria','Jordan':'Jordania','Ghana':'Ghana','Panama':'Panamá',
  'England':'Inglaterra','Croatia':'Croacia','Portugal':'Portugal',
  'DR Congo':'Congo DR','Uzbekistan':'Uzbekistán','Colombia':'Colombia',
  'Serbia':'Serbia','Denmark':'Dinamarca','Poland':'Polonia','Chile':'Chile',
  'Peru':'Perú','Venezuela':'Venezuela','Bolivia':'Bolivia',
  'Costa Rica':'Costa Rica','Honduras':'Honduras','Jamaica':'Jamaica',
  'El Salvador':'El Salvador','Trinidad and Tobago':'Trinidad y Tobago',
  'Wales':'Gales','Ukraine':'Ucrania','Hungary':'Hungría','Slovenia':'Eslovenia',
  'Slovakia':'Eslovaquia','Romania':'Rumania','Albania':'Albania',
  'Finland':'Finlandia','Greece':'Grecia','Serbia':'Serbia',
};
const tn = n => NOMBRES[n] || n;

// ── HELPERS DE ZONA HORARIA ───────────────────────────────────────────────────
function toARGDate(utc) {
  return new Date(new Date(utc).toLocaleString('en-US', { timeZone: TZ }));
}
function argTimeStr(utc) {
  return new Date(utc).toLocaleTimeString('es-AR', {
    hour: '2-digit', minute: '2-digit', timeZone: TZ
  });
}
function argDateLabel(utc) {
  const s = new Date(utc).toLocaleDateString('es-AR', {
    weekday:'long', day:'numeric', month:'long', timeZone: TZ
  });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function argDateKey(utc) {
  return new Date(utc).toLocaleDateString('en-CA', { timeZone: TZ }); // YYYY-MM-DD
}
function isToday(utc) {
  const d = toARGDate(utc);
  const n = toARGDate(new Date().toISOString());
  return d.toDateString() === n.toDateString();
}
function isPast(utc) {
  const d = toARGDate(utc);
  const n = toARGDate(new Date().toISOString());
  d.setHours(0,0,0,0); n.setHours(0,0,0,0);
  return d < n;
}

// ── CANAL ─────────────────────────────────────────────────────────────────────
function getCanal(h, a) {
  if (h === 'Argentina' || a === 'Argentina')
    return '<span class="canal arg">TyC Sports · Telefe · TV Pública</span>';
  return '<span class="canal">TyC Sports · DSports</span>';
}

// ── RENDER PARTIDO ────────────────────────────────────────────────────────────
function renderPartido(m, showCanal) {
  const hn  = tn(m.homeTeam.name);
  const an  = tn(m.awayTeam.name);
  const hOr = m.homeTeam.name;
  const aOr = m.awayTeam.name;
  const st  = m.status;  // SCHEDULED, TIMED, IN_PLAY, PAUSED, FINISHED
  const ko  = m.utcDate;
  const grp = m.group ? m.group.replace('GROUP_', 'Grupo ') : '';
  const venue = m.venue || '';
  const meta  = [grp, venue].filter(Boolean).join(' · ');

  let pillHtml, marcadorHtml, cls;

  if (st === 'FINISHED') {
    const h = m.score?.fullTime?.home ?? '?';
    const a = m.score?.fullTime?.away ?? '?';
    pillHtml    = `<span class="estado-pill pill-done">✓ Finalizado</span>`;
    marcadorHtml = `<div class="marcador">${h} - ${a}</div>`;
    cls = 'partido done';

  } else if (st === 'IN_PLAY') {
    const h   = m.score?.fullTime?.home ?? '?';
    const a   = m.score?.fullTime?.away ?? '?';
    const min = m.minute ? `${m.minute}'` : '▶';
    pillHtml    = `<span class="estado-pill pill-live">🔴 EN JUEGO · ${min}</span>`;
    marcadorHtml = `<div class="marcador live-score">${h} - ${a}</div>`;
    cls = 'partido live';

  } else if (st === 'PAUSED') {
    const h = m.score?.fullTime?.home ?? '?';
    const a = m.score?.fullTime?.away ?? '?';
    pillHtml    = `<span class="estado-pill pill-paused">⏸ Entretiempo</span>`;
    marcadorHtml = `<div class="marcador paused-score">${h} - ${a}</div>`;
    cls = 'partido paused';

  } else {
    // SCHEDULED / TIMED
    const hora  = argTimeStr(ko);
    pillHtml    = `<span class="estado-pill pill-next">⏰ ${hora} hs</span>`;
    marcadorHtml = `<div class="marcador hora">${hora}</div>`;
    cls = 'partido next';
  }

  // ID para botón flotante de Argentina (primer partido no finalizado)
  const esArg  = (hOr === 'Argentina' || aOr === 'Argentina');
  const noFin  = st !== 'FINISHED';
  const idAttr = (esArg && noFin) ? 'id="proximo-arg"' : '';

  return `<div class="${cls}" ${idAttr}>
    ${pillHtml}
    <div class="partido-fila">
      <div class="equipo">${hn}</div>
      ${marcadorHtml}
      <div class="equipo der">${an}</div>
    </div>
    <div class="partido-meta">
      <span>${meta}</span>
      ${showCanal ? getCanal(hOr, aOr) : ''}
    </div>
  </div>`;
}

// ── RENDER PESTAÑA PARTIDOS ───────────────────────────────────────────────────
function renderPartidos(matches) {
  const sorted = [...matches].sort((a, b) =>
    new Date(a.utcDate) - new Date(b.utcDate)
  );

  // Agrupar por día Argentina
  const byDay = new Map();
  sorted.forEach(m => {
    const key = argDateKey(m.utcDate);
    if (!byDay.has(key)) byDay.set(key, []);
    byDay.get(key).push(m);
  });

  let html = '';
  let hasToday = false;

  byDay.forEach((ms, key) => {
    const esHoy   = isToday(ms[0].utcDate);
    const esPasado = isPast(ms[0].utcDate);
    if (esHoy) hasToday = true;

    const label   = argDateLabel(ms[0].utcDate);
    const idBloque = esHoy ? 'id="hoy-anchor"' : '';
    const suffix   = esHoy ? ' — HOY' : '';

    html += `<div class="dia-bloque" ${idBloque}>
      <div class="dia-titulo${esHoy ? ' hoy' : ''}">${label}${suffix}</div>`;
    ms.forEach(m => { html += renderPartido(m, esHoy); });
    html += `</div>`;
  });

  html += `<div class="footer">
    Datos: football-data.org · Actualización automática cada 60 seg
    <br><button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar ahora</button>
  </div>`;

  document.getElementById('tab-partidos').innerHTML = html;

  // Scroll al día de hoy solo la primera vez
  if (hasToday && !window._scrolledToday) {
    window._scrolledToday = true;
    setTimeout(() => {
      const el = document.getElementById('hoy-anchor');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
  }
}

// ── RENDER PESTAÑA GRUPOS ─────────────────────────────────────────────────────
function renderGrupos(standings) {
  let html = `<div class="leyenda">
    <span><span class="dot" style="background:#1565c0"></span> 1° clasifica</span>
    <span><span class="dot" style="background:#2e7d32"></span> 2° clasifica</span>
    <span><span class="dot" style="background:#ccc"></span> Eliminado</span>
  </div><div class="grupos-grid">`;

  standings.forEach(grp => {
    const nombre  = (grp.group || '').replace('GROUP_', 'Grupo ');
    const table   = grp.table || [];
    const hasArg  = table.some(r => r.team?.name === 'Argentina');
    const maxPJ   = Math.max(...table.map(r => r.playedGames || 0), 0);

    html += `<div class="grupo-card">
      <div class="grupo-titulo">${nombre}${hasArg ? ' 🇦🇷' : ''}</div>
      <table class="grupo-tabla">
        <tr><th>Selección</th><th>PJ</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th></tr>`;

    table.forEach((r, i) => {
      const nm  = tn(r.team?.name || '?');
      const pj  = r.playedGames ?? 0;
      const gf  = r.goalsFor   ?? 0;
      const gc  = r.goalsAgainst ?? 0;
      const dg  = r.goalDifference ?? (gf - gc);
      const pts = r.points ?? 0;
      const dgStr = dg > 0 ? `+${dg}` : `${dg}`;

      let cls = '';
      if (i === 0) cls = 'c1';
      else if (i === 1) cls = 'c2';
      else if (pj >= 2 && pts === 0 && pj === maxPJ) cls = 'cx';

      html += `<tr>
        <td><span class="pos">${i+1}</span><span class="${cls}">${nm}</span></td>
        <td>${pj}</td><td>${gf}</td><td>${gc}</td>
        <td>${dgStr}</td><td><strong>${pts}</strong></td>
      </tr>`;
    });

    html += `</table></div>`;
  });

  html += `</div><div class="footer">
    Datos: football-data.org · Actualización automática cada 60 seg
    <br><button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar ahora</button>
  </div>`;

  document.getElementById('tab-grupos').innerHTML = html;
}

// ── BOTONES FLOTANTES ─────────────────────────────────────────────────────────
function irAHoy() {
  if (!document.getElementById('tab-partidos').classList.contains('visible'))
    showTab('partidos', document.querySelector('.nav button'));
  setTimeout(() => {
    document.getElementById('hoy-anchor')
      ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function irAArgentina() {
  if (!document.getElementById('tab-partidos').classList.contains('visible'))
    showTab('partidos', document.querySelector('.nav button'));
  setTimeout(() => {
    document.getElementById('proximo-arg')
      ?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function actualizarFabs(matches) {
  // Botón HOY
  const hayHoy = matches.some(m => isToday(m.utcDate));
  document.getElementById('fab-hoy').classList.toggle('oculto', !hayHoy);

  // Botón Argentina: próximo o en juego
  const fabArg = document.getElementById('fab-arg');
  const argProximo = matches
    .filter(m => m.homeTeam?.name === 'Argentina' || m.awayTeam?.name === 'Argentina')
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate))
    .find(m => m.status !== 'FINISHED');

  if (argProximo) {
    fabArg.classList.remove('oculto');
    const st = argProximo.status;
    if (st === 'IN_PLAY' || st === 'PAUSED') {
      const h   = argProximo.score?.fullTime?.home ?? '?';
      const a   = argProximo.score?.fullTime?.away ?? '?';
      const min = argProximo.minute ? ` (${argProximo.minute}')` : '';
      fabArg.classList.add('en-juego');
      fabArg.textContent = st === 'PAUSED'
        ? `🇦🇷 Argentina ⏸ ${h}-${a} ET`
        : `🔴 Argentina EN JUEGO ${h}-${a}${min}`;
    } else {
      fabArg.classList.remove('en-juego');
      const hora  = argTimeStr(argProximo.utcDate);
      const fecha = new Date(argProximo.utcDate).toLocaleDateString('es-AR', {
        day: 'numeric', month: 'short', timeZone: TZ
      });
      fabArg.textContent = `🇦🇷 Argentina · ${fecha} ${hora}`;
    }
  } else {
    fabArg.classList.add('oculto');
  }
}

// ── TAB SWITCHER ──────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('visible'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('visible');
  btn.classList.add('active');
}

// ── CARGA DE DATOS ────────────────────────────────────────────────────────────
async function cargarDatos() {
  try {
    const t = Date.now();
    const [resMatches, resStandings] = await Promise.all([
      fetch(`${PROXY}/v4/competitions/WC/matches?t=${t}`),
      fetch(`${PROXY}/v4/competitions/WC/standings?t=${t}`),
    ]);

    if (!resMatches.ok)   throw new Error(`Matches HTTP ${resMatches.status}`);
    if (!resStandings.ok) throw new Error(`Standings HTTP ${resStandings.status}`);

    const dataMatches   = await resMatches.json();
    const dataStandings = await resStandings.json();

    const matches   = dataMatches.matches || [];
    const standings = dataStandings.standings || [];

    if (!matches.length)   throw new Error('No se recibieron partidos');
    if (!standings.length) throw new Error('No se recibieron standings');

    renderPartidos(matches);
    renderGrupos(standings);
    actualizarFabs(matches);

    const now = new Date().toLocaleString('es-AR', {
      timeZone: TZ, day:'numeric', month:'long',
      hour:'2-digit', minute:'2-digit'
    });
    document.getElementById('upd-ts').textContent = `Actualizado: ${now}`;

  } catch(e) {
    const msg = `<div class="error-msg">
      ❌ Error al cargar datos<br>
      <small>${e.message}</small><br><br>
      <button class="refresh-btn" onclick="cargarDatos()">↻ Reintentar</button>
    </div>`;
    document.getElementById('tab-partidos').innerHTML = msg;
    document.getElementById('tab-grupos').innerHTML   = msg;
    document.getElementById('upd-ts').textContent = 'Error al cargar';
    console.error(e);
  }
}

// ── INICIO ────────────────────────────────────────────────────────────────────
cargarDatos();
setInterval(cargarDatos, 60 * 1000); // refresh cada 60 segundos
</script>
</body>
